version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: medisync_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: medisync
    ports:
      - "3307:3306"
    volumes:
      - ./database/schema.sql:/docker-entrypoint-initdb.d/1_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/2_seed.sql
      - medisync_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
    container_name: medisync_backend
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=password
      - DB_NAME=medisync
      - FLASK_DEBUG=True
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: 
      context: ./frontend
    container_name: medisync_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  medisync_db_data:
